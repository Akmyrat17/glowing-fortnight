# Application config values. Sensitive overrides should go in root .env or environment variables.

server:
  host: ""
  port: 8080
  env: development
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  graceful_shutdown_timeout: 10s
  hide_banner: true
  hide_port: false

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  name: boilerplate
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

logger:
  level: info
  format: text
  output: stdout

middleware:
  cors:
    enabled: true
    allow_origins:
      - "*"
    allow_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allow_headers:
      - "*"
    allow_credentials: false
    max_age: 3600
  rate_limit:
    enabled: false
    rate: 20.0
    burst: 5
  request_size:
    enabled: true
    max_size: 2M

firebase:
  credentials_file: ./configs/firebase-credentials.json

jwt:
  secret: your-secret-key-change-this-in-production
  access_token_expiration: 30m
  refresh_token_expiration: 168h
